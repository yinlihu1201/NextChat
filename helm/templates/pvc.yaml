{{- if .Values.frontend.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "nextchat.fullname" . }}-data
  labels:
    {{- include "nextchat.labels" . | nindent 4 }}
spec:
  accessModes:
    - {{ .Values.frontend.persistence.accessMode }}
  resources:
    requests:
      storage: {{ .Values.frontend.persistence.size }}
  {{- if .Values.frontend.persistence.storageClass }}
  storageClassName: {{ .Values.frontend.persistence.storageClass }}
  {{- end }}
{{- end }}