# Default values for nextchat

# Replica count
replicaCount: 1

# Common environment variable (access password)
code: ""

# Image configuration
global:
  imagePullPolicy: IfNotPresent
  imageRegistry: ""

frontend:
  image:
    repository: yidadaa/nextchat-front
    tag: "1.0"
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 128Mi
  # Data persistence - merged from old backend
  persistence:
    enabled: true
    size: 1Gi
    mountPath: /opt/chat/data
    storageClass: ""
    accessMode: ReadWriteOnce
    existingClaim: ""

# Environment variables (for frontend)
openaiApiKey: ""
googleApiKey: ""
baseUrl: ""
openaiOrgId: ""
hideUserApiKey: ""
disableGpt4: ""
enableBalanceQuery: ""
disableFastLink: ""
enableMcp: ""
# Data directory for persistence
dataDir: "/opt/chat/data"
